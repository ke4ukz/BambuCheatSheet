# Bed-adhesion products (glues) the tool knows about. `id` matches the adhesion
# type ids referenced by product files under each plate's `adhesion.types`.
# Only adhesives with a sourced product page are listed here. Per the project
# rule, every value carries a source link. Generic adhesives some products
# reference (hairspray, blue-tape, kapton-tape) have no Bambu product page and
# are intentionally absent until a citable source exists.

glues:
  - id: liquid-glue
    label: Liquid Glue
    manufacturer: Bambu Lab
    sources:
      - label: Bambu Lab Store — Liquid Glue for Build Plate
        url: https://us.store.bambulab.com/products/liquid-glue-for-build-plate
      - label: Bambu Lab Wiki — How to use Bambu Lab Liquid Glue
        url: https://wiki.bambulab.com/en/general/how-to-use-bbl-liquid-glue
      - label: Bambu Lab Wiki — Filament Guide (material table)
        url: https://wiki.bambulab.com/en/general/filament-guide-material-table
    plateCompatibility: All Bambu Lab build plates
    # Materials Bambu explicitly lists (store + wiki agree). Catalog material ids
    # only; sources also list PET (not a catalog material). PC/PA explicitly
    # "Not Recommended" — see note.
    materials: [PLA, PETG, ABS, ASA, TPU]
    materialsNote: >-
      Store and wiki also list PET. The wiki material table marks Liquid Glue
      "Not Recommended" for PC and PA (use Glue Stick instead).
    # Recommended hotbed temperature when using this glue, per material (store).
    bedTempByMaterial:
      PLA: { min: 40, max: 60 }
      PETG: { min: 60, max: 80 }
      PET: { min: 80, max: 100 }
      ABS: { min: 90, max: 100 }
      ASA: { min: 90, max: 100 }
      TPU: { min: 30, max: 45 }
    cureTime: Dries in ~30 min to 1 h; up to 24 h to fully cure (varies with temp/humidity)
    features:
      - Less residue on the model and easier to clean (water) than glue stick
      - More uniform application than glue stick
      - Lower odor; ingredients described as eco-friendly and skin-safe
    specs:
      packageVolume: 60 mL
      workingLife: ~100 full-plate coats
    # The FACT (Liquid Glue not for PC/PA) is now sourced in materialsNote via the
    # wiki material table. What remains below is only our REASONING for *why* —
    # that part is still an inference, not a Bambu statement.
    inference: >-
      Likely reason: a temperature ceiling rather than chemical incompatibility —
      PC/PA print on beds (~100-120 C) above Liquid Glue's recommended range, while
      Glue Stick is rated to those temps. (Our reasoning, not a Bambu statement.)

  - id: glue-stick
    label: Glue stick
    manufacturer: Bambu Lab
    sources:
      - label: Bambu Lab Store — Glue Stick for Build Plate
        url: https://us.store.bambulab.com/products/glue-stick-for-build-plate
      - label: Bambu Lab Wiki — How to use Bambu Lab Liquid Glue
        url: https://wiki.bambulab.com/en/general/how-to-use-bbl-liquid-glue
      - label: Bambu Lab Wiki — Filament Guide (material table)
        url: https://wiki.bambulab.com/en/general/filament-guide-material-table
    plateCompatibility: All Series
    # Covers the high-temp materials (PC, PA) that liquid glue omits; wiki calls
    # out PC/PA suitability specifically.
    materials: [PLA, ABS, PETG, PC, PA, TPU]
    materialsNote: >-
      Works across the full range incl. PC and PA, where Liquid Glue is not
      recommended. A regular glue stick can also be applied to ease removal of
      high-adhesion filaments.
    # Bed temps (with glue) per material, from the wiki material table.
    bedTempByMaterial:
      PLA: { min: 35, max: 65 }
      PETG: { min: 60, max: 80 }
      PET: { min: 80, max: 100 }
      TPU: { min: 30, max: 45 }
      ABS: { min: 90, max: 100 }
      ASA: { min: 90, max: 100 }
      PA: { min: 90, max: 110 }
      PC: { min: 100, max: 120 }
    features:
      - Water dissolvable
      - Formaldehyde-free
    specs:
      packageWeight: 50 g
      lifeCycle: 24 months

# Generic, plate-by-plate guidance on whether/which glue to use. NOT
# product-specific — this is Bambu's general advice per build plate. Per-product
# adhesion data in the product files takes precedence when present.
plateGlueGuidance:
  source:
    label: Bambu Lab Wiki — How to use Bambu Lab Liquid Glue
    url: https://wiki.bambulab.com/en/general/how-to-use-bbl-liquid-glue
  notes:
    engineering: >-
      Apply glue before printing any filament. Glue stick eases part removal but
      its thickness/uneven coat usually means worse first-layer quality and
      stability than liquid; liquid glue gives a better first layer but can make
      removal harder. Choose by filament and conditions.
    textured-pei: >-
      Usually no glue needed. For strong-bonding filaments like PETG, apply glue
      to REDUCE adhesion and ease removal (and avoid whitening/damaging the model
      when forcing it off).
    supertack: No glue required.
    cool-plate: >-
      (Discontinued.) Suitable only for PLA, and glue should be applied before
      printing. Other filaments (PETG, ABS) may bulge or stick.
    # The wiki also covers two plates with no catalog id (kept for completeness):
    #   Smooth PEI Plate: for high-temp filaments; except PLA, apply glue before
    #     printing other filaments (e.g. PA6-GF prints better, less warping).
    #   High Temperature Plate (discontinued): use glue for non-PLA filaments.
