# X2D filament compatibility matrix — Bambu Lab X2D (dual-hotend) printer.
#
# Single authoritative source: the Bambu wiki page below. Three tables:
#   main  = main hotend (3 levels: ok / caution / no)
#   aux   = auxiliary (second) hotend (4 levels, adds "discouraged")
#   track = filament track switch — whether the filament jams in the switch,
#           INDEPENDENT of hotend compatibility (per the wiki).
# Each table is keyed by nozzle column (see `columns`). A table may be absent
# for a filament if the wiki did not list it there.
#
# productId joins a row to a catalog product in src/data/products/. null means
# the wiki lists a filament we do not (yet) carry in the catalog.
#
# Regenerate note: transcribed from the wiki table; verify against `source.url`.

source:
  label: Bambu Lab Wiki — X2D Filament Compatibility Guide
  url: https://wiki.bambulab.com/en/x2d/manual/filament-compatibility
columns:
  - "0.2"
  - "0.4"
  - "0.6"
  - "0.8"
  - hf-0.4
  - hf-0.6
  - hf-0.8
legend:
  main:
    ok: Available
    caution: Not recommended
    "no": Unavailable
  aux:
    ok: Available
    caution: Not recommended
    discouraged: Highly not recommended
    "no": Unavailable
  track:
    ok: Available
    caution: Not recommended
    discouraged: Highly not recommended
    "no": Unavailable
