id: bambu-paht-cf
manufacturer: Bambu Lab
name: PAHT-CF
material: PA

sources:
  - source:
      label: Bambu Lab (BambuStudio profiles)
      url: https://github.com/bambulab/BambuStudio/blob/master/resources/profiles/BBL/filament/Bambu%20PAHT-CF%20%40base.json
    # nozzle_temperature: 290 (machine profiles X1C/H2D); range 260–300 from fdm_filament_pa parent
    nozzleTemp: 290
    firstLayerNozzleTemp: 290
    # chamber_temperatures: 60 (X1C, H2D machine profiles)
    chamberTemp: 60
    # required_nozzle_HRC: 40 inherited from fdm_filament_pa — hardened nozzle required; CF is abrasive
    hardenedNozzleRequired: true
    abrasive: true
    nozzleSizeMin: 0.4
    # filament_max_volumetric_speed: 8 (X1C first slot)
    maxVolumetricSpeed: 8
    enclosureRequired: true
  - source:
      label: Bambu Lab TDS V3.0
      url: https://store.bblcdn.com/7166b20bc68f4c87b32c972b856eeb4b.pdf
    dryBeforeUse: "80°C for 8–12h (blast oven) or 90–100°C for 12h (X1 heatbed)"
    plates:
      textured-pei:
        # textured_plate_temp: 100 (inherited from fdm_filament_pa)
        bedTemp: 100
        firstLayerBedTemp: 100
        adhesion: { required: true, types: [glue-stick] }
      cool-plate:
        # cool_plate_temp: 0 in parent — not supported
        supported: false
      supertack:
        # supertack_plate_temp: 0 in parent — not supported
        supported: false
      engineering:
        # eng_plate_temp: 100 (inherited from fdm_filament_pa)
        bedTemp: 100
        firstLayerBedTemp: 100
        adhesion: { required: true, types: [glue-stick] }
