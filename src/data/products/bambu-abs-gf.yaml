id: bambu-abs-gf
manufacturer: Bambu Lab
name: ABS-GF
material: ABS

sources:
  - source:
      label: Bambu Lab TDS V1.0
      url: https://store.bblcdn.com/2450f3fe0251448c91c5a191b7cb6a1e.pdf
    nozzleTemp: { min: 240, max: 280 }
    chamberTemp: { min: 45, max: 60 }
    hardenedNozzleRequired: true
    abrasive: true
    nozzleSizeMin: 0.4
    dryBeforeUse: "80°C for 8h (blast oven) or 90-100°C for 12h (X1 heatbed)"
    enclosureRequired: true
    plates:
      textured-pei:
        bedTemp: { min: 80, max: 100 }
        adhesion: { required: true }
      cool-plate:
        supported: false
      supertack:
        supported: false
      engineering:
        bedTemp: { min: 80, max: 100 }
        adhesion: { required: true }
  - source:
      label: Bambu Lab Store — ABS-GF (Cautions for Use)
      url: https://us.store.bambulab.com/products/abs-gf
    # AMS 2 Pro/HT/AMS ok, AMS lite NOT compatible (bool reflects regular AMS;
    # comparison table also lists AMS Compatibility: YES). hardened/abrasive/
    # nozzleSizeMin/enclosure already set; store corroborates. Glue: both liquid
    # + stick recommended (bed 80-100C within liquid's ABS range).
    amsCompatible: true
    plates:
      textured-pei:
        adhesion: { required: true, types: [liquid-glue, glue-stick] }
      engineering:
        adhesion: { required: true, types: [liquid-glue, glue-stick] }
