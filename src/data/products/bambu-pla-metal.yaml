id: bambu-pla-metal
manufacturer: Bambu Lab
name: PLA Metal
material: PLA

sources:
  - source:
      label: Bambu Lab (BambuStudio profiles)
      url: https://github.com/bambulab/BambuStudio/blob/master/resources/profiles/BBL/filament/Bambu%20PLA%20Metal%20%40base.json
    # Inherits all temps from fdm_filament_pla; no overrides in @base
    nozzleTemp: 220
    firstLayerNozzleTemp: 220
    hardenedNozzleRequired: false
    abrasive: false
    nozzleSizeMin: null
    enclosureRequired: false
  - source:
      label: Bambu Lab TDS V3.0
      url: https://store.bblcdn.com/c6c28a13ba294c6f9fe62755ec9188fa.pdf
    dryBeforeUse: "55°C for 8h (blast oven) or 65-75°C for 12h (X1 heatbed)"
    plates:
      textured-pei:
        bedTemp: 55
        firstLayerBedTemp: 55
        adhesion: { required: false, types: [] }
      cool-plate:
        bedTemp: 35
        firstLayerBedTemp: 35
        adhesion: { required: false, types: [] }
      supertack:
        bedTemp: 45
        firstLayerBedTemp: 45
        adhesion: { required: false, types: [] }
      engineering:
        supported: false
  - source:
      label: Bambu Lab Store — PLA Metal (Cautions for Use)
      url: https://us.store.bambulab.com/products/pla-metal
    amsCompatible: true
    plates:
      textured-pei:
        adhesion: { required: false, types: [liquid-glue, glue-stick] }
