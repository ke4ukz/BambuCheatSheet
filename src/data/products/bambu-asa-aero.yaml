id: bambu-asa-aero
manufacturer: Bambu Lab
name: ASA Aero
material: ASA

sources:
  - source:
      label: Bambu Lab TDS V1.0
      url: https://store.bblcdn.com/s1/default/02b005fdf02d450084e3128f7cf0c36f/Bambu_ASA_Aero_Technical_Data_Sheet.pdf
    nozzleTemp: { min: 240, max: 280 }
    chamberTemp: { min: 45, max: 60 }
    hardenedNozzleRequired: false
    abrasive: false
    nozzleSizeMin: null
    dryBeforeUse: "80°C for 8h (blast oven) or 90-100°C for 12h (X1 heatbed)"
    enclosureRequired: true
    plates:
      textured-pei:
        # TDS explicitly states "Textured PEI Plate (Not Recommended)"
        supported: false
      cool-plate:
        supported: false
      supertack:
        supported: false
      engineering:
        bedTemp: { min: 80, max: 90 }
        adhesion: { required: true }
  - source:
      label: Bambu Lab Store — ASA Aero (Cautions for Use)
      url: https://us.store.bambulab.com/products/asa-aero
    # AMS 2 Pro/HT/AMS ok, AMS lite NOT compatible (bool reflects regular AMS).
    # Only the 0.4mm nozzle is recommended: 0.2 not recommended (min 0.4) AND
    # 0.6/0.8 not recommended (max 0.4 — tracked in nozzleSizeMax gap). Glue:
    # both liquid + stick recommended (bed 80-90C is within liquid's range).
    # Plate discrepancy: store recommends Smooth PEI + Textured PEI, but the TDS
    # marks Textured PEI not recommended (supported:false above) — left as TDS.
    # Store also marks Cool Plate SuperTack not recommended (matches).
    amsCompatible: true
    nozzleSizeMin: 0.4
    nozzleSizeMax: 0.4
    plates:
      engineering:
        adhesion: { required: true, types: [liquid-glue, glue-stick] }
