id: bambu-ppa-cf
manufacturer: Bambu Lab
name: PPA-CF
material: Other

sources:
  - source:
      label: Bambu Lab (BambuStudio profiles)
      url: https://github.com/bambulab/BambuStudio/blob/master/resources/profiles/BBL/filament/Bambu%20PPA-CF%20%40base.json
    # nozzle_temperature: 290 (X1C, H2D machine profiles; range 280–320 from fdm_filament_ppa parent)
    nozzleTemp: 290
    firstLayerNozzleTemp: 290
    # chamber_temperatures: 60 (X1C, H2D machine profiles)
    chamberTemp: 60
    # required_nozzle_HRC: 40 inherited from fdm_filament_ppa — hardened nozzle required; CF is abrasive
    hardenedNozzleRequired: true
    abrasive: true
    nozzleSizeMin: 0.4
    # filament_max_volumetric_speed: 8 (X1C first slot)
    maxVolumetricSpeed: 8
    enclosureRequired: true
  - source:
      label: Bambu Lab TDS V1.0
      url: https://store.bblcdn.eu/s8/default/f592e57fe69c40289897513bdd2b61bc/Bambus_PPA-CF_Technical_Data_Sheet_2ab26420-79f5-4692-888e-090006814050.pdf
    dryBeforeUse: "100–140°C for 8–12h (blast oven; higher = better) or 110–120°C for 12h (X1 heatbed)"
    plates:
      textured-pei:
        # textured_plate_temp: 100 (inherited from fdm_filament_ppa)
        bedTemp: 100
        firstLayerBedTemp: 100
        adhesion: { required: true, types: [glue-stick] }
      cool-plate:
        # cool_plate_temp: 0 in parent — not supported
        supported: false
      supertack:
        # supertack_plate_temp: 0 in parent — not supported
        supported: false
      engineering:
        # eng_plate_temp: 100 (inherited from fdm_filament_ppa)
        bedTemp: 100
        firstLayerBedTemp: 100
        adhesion: { required: true, types: [glue-stick] }
  - source:
      label: Bambu Lab (store page — Cautions for Use)
      url: https://us.store.bambulab.com/products/ppa-cf
    # Cautions for Use: "All AMS Series NOT Compatible; 0.2 mm Nozzle NOT Compatible;
    # Hardened Steel Nozzle Mandatory; Must Be Dried before Use"
    amsCompatible: false
