id: bambu-pa6-gf
manufacturer: Bambu Lab
name: PA6-GF
material: PA

sources:
  - source:
      label: Bambu Lab (BambuStudio profiles)
      url: https://github.com/bambulab/BambuStudio/blob/master/resources/profiles/BBL/filament/Bambu%20PA6-GF%20%40base.json
    # nozzle_temperature: 265 (X1C, X1E, H2D, P1P machine profiles)
    nozzleTemp: 265
    firstLayerNozzleTemp: 265
    # chamber_temperatures: 60 (X1C, H2D machine profiles)
    chamberTemp: 60
    # required_nozzle_HRC: 40 inherited from fdm_filament_pa — hardened nozzle required; GF is abrasive
    hardenedNozzleRequired: true
    abrasive: true
    nozzleSizeMin: 0.4
    # filament_max_volumetric_speed: 10.5 (X1C, P1P machine profiles)
    maxVolumetricSpeed: 10.5
    enclosureRequired: true
  - source:
      label: Bambu Lab TDS V1.0
      url: https://store.bblcdn.com/s5/default/f0317db8b3f44d0486553c1e214cff9d.pdf
    dryBeforeUse: "80°C for 8–12h (blast oven) or 90–100°C for 12h (X1 heatbed)"
    plates:
      textured-pei:
        # textured_plate_temp: 100 (inherited from fdm_filament_pa)
        bedTemp: 100
        firstLayerBedTemp: 100
        adhesion: { required: true, types: [glue-stick] }
      cool-plate:
        # cool_plate_temp: 0 in parent — not supported
        supported: false
      supertack:
        # supertack_plate_temp: 0 in parent — not supported
        supported: false
      engineering:
        # eng_plate_temp: 100 (inherited from fdm_filament_pa)
        bedTemp: 100
        firstLayerBedTemp: 100
        adhesion: { required: true, types: [glue-stick] }
