id: bambu-tpu-95a-hf
manufacturer: Bambu Lab
name: TPU 95A HF
material: TPU

sources:
  - source:
      label: Bambu Lab TDS V1.0
      url: https://store.bblcdn.eu/s8/default/16df21baf482453999b3dbb61cc110e7/Bambu_TPU_95A_HF_Technical_Data_Sheet.pdf
    nozzleTemp: { min: 220, max: 240 }
    chamberTemp: { min: 25, max: 45 }
    hardenedNozzleRequired: false
    abrasive: false
    nozzleSizeMin: 0.4
    dryBeforeUse: "70°C for 8h (blast oven) or 80-90°C for 12h (X1 heatbed)"
    enclosureRequired: false
    plates:
      textured-pei:
        bedTemp: { min: 30, max: 35 }
        adhesion: { required: true }
      cool-plate:
        bedTemp: { min: 30, max: 35 }
        adhesion: { required: true }
      engineering:
        bedTemp: { min: 30, max: 35 }
        adhesion: { required: true }
  - source:
      label: Bambu Lab Store — TPU 95A HF (Cautions for Use)
      url: https://us.store.bambulab.com/products/tpu-95a-hf
    # "All AMS Series NOT Compatible" — explicit, so amsCompatible:false. 0.2mm
    # nozzle not recommended (nozzleSizeMin 0.4 already set). Glue: both liquid +
    # stick recommended (moved here from TDS). Store recommends Smooth PEI +
    # Textured PEI; Cool Plate SuperTack not recommended.
    amsCompatible: false
    plates:
      textured-pei:
        adhesion: { required: true, types: [liquid-glue, glue-stick] }
      engineering:
        adhesion: { required: true, types: [liquid-glue, glue-stick] }
