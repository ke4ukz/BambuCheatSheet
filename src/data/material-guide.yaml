# Material-TYPE-generic quick-reference guides, transcribed from the Bambu wiki
# "Filament Guide" material table (one source for the whole file). Keyed by
# material type, NOT per product — this is Bambu's general guidance and belongs
# in the Guides hub, distinct from the per-product lookup. Where a specific
# product's page gives an exact value, the per-product lookup is more precise.
#
# Each guide: id, title, intro, columns [{key,label}], rows [{<key>: value}].
# The app renders them with one generic table component.

source:
  label: Bambu Lab Wiki — Filament Guide (material table)
  url: https://wiki.bambulab.com/en/general/filament-guide-material-table
lastChecked: "2026-06-07"

guides:
  - id: drying
    title: Drying
    intro: >-
      How to dry each material, by drying method. Drying is the most common cause
      of poor prints. "Required" means dry before every use; AMS 2 Pro can dry
      some materials in-unit, AMS HT goes hotter.
    columns:
      - { key: material, label: Material }
      - { key: requirement, label: Dry before use? }
      - { key: oven, label: Blast drying oven }
      - { key: ams2pro, label: AMS 2 Pro }
      - { key: amsht, label: AMS HT }
      - { key: desiccant, label: Desiccant while printing }
    rows:
      - { material: "PLA", requirement: "Recommended", oven: "55 °C / 8 h", ams2pro: "45 °C / 12 h", amsht: "45 °C / 12 h", desiccant: "Optional" }
      - { material: "Wood / Rock / Metal-filled PLA", requirement: "Recommended", oven: "55 °C / 8 h", ams2pro: "45 °C / 12 h", amsht: "45 °C / 12 h", desiccant: "Optional" }
      - { material: "PLA-CF", requirement: "Recommended", oven: "55 °C / 8 h", ams2pro: "45 °C / 12 h", amsht: "45 °C / 12 h", desiccant: "Optional" }
      - { material: "PVA", requirement: "Required", oven: "55 °C / 8 h", ams2pro: "Not recommended", amsht: "85 °C / 18 h", desiccant: "Required" }
      - { material: "PETG", requirement: "Recommended", oven: "70 °C / 8 h", ams2pro: "65 °C / 12 h", amsht: "65 °C / 12 h", desiccant: "Optional" }
      - { material: "PETG HF / PETG Translucent", requirement: "Required", oven: "65 °C / 8 h", ams2pro: "65 °C / 12 h", amsht: "65 °C / 12 h", desiccant: "Required" }
      - { material: "PETG-CF", requirement: "Recommended", oven: "70 °C / 8 h", ams2pro: "65 °C / 12 h", amsht: "65 °C / 12 h", desiccant: "Optional" }
      - { material: "ABS", requirement: "Recommended", oven: "80 °C / 8 h", ams2pro: "Not recommended", amsht: "80 °C / 8 h", desiccant: "Optional" }
      - { material: "ASA", requirement: "Recommended", oven: "80 °C / 8 h", ams2pro: "Not recommended", amsht: "80 °C / 8 h", desiccant: "Optional" }
      - { material: "PC", requirement: "Required", oven: "80 °C / 8 h", ams2pro: "Not recommended", amsht: "80 °C / 8 h", desiccant: "Required" }
      - { material: "PA", requirement: "Required", oven: "80 °C / 8-12 h", ams2pro: "Not recommended", amsht: "85 °C / 12 h", desiccant: "Required" }
      - { material: "PA-CF/GF, PAHT-CF/GF", requirement: "Required", oven: "80 °C / 8-12 h", ams2pro: "Not recommended", amsht: "85 °C / 12 h", desiccant: "Required" }
      - { material: "PET-CF/GF", requirement: "Required", oven: "80 °C / 8-12 h", ams2pro: "Not recommended", amsht: "80 °C / 12 h", desiccant: "Required" }
      - { material: "TPU", requirement: "Required", oven: "70 °C / 8 h", ams2pro: "Not recommended", amsht: "75 °C / 12 h", desiccant: "Required" }

